<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>₿AZAR TCM — рынок без границ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b1e2b1; /* основной фон */
      position: relative;
      z-index: 0;
    }

    /* Узор поверх фона */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("https://i.imgur.com/RiwnVdD.png") repeat;
      opacity: 0.2; /* 20% прозрачность */
      z-index: -1;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }
    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .category {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .category button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: #3399ff; /* голубые кнопки */
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .category button:hover {
      background: #287acc;
    }
    footer {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      font-size: 14px;
    }
    footer a {
      color: #00aced;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>₿AZAR TCM — рынок без границ</header>

<section class="categories" id="categories"></section>

<footer>
  <p>₿AZAR TCM — рынок без границ © 2025</p>
  <p>Размещение объявлений через Telegram <a href="https://t.me/BazarTcmBot" target="_blank">@BazarTcmBot</a></p>
  <p><a href="#">Политика конфиденциальности</a> | <a href="#">Пользовательское соглашение</a></p>
</footer>

<script>
  const categories = [
    "Авто",
    "Недвижимость",
    "Работа",
    "Одежда и обувь",
    "Хобби и отдых",
    "Животные",
    "Бизнес и оборудование",
    "Услуги",
    "Электроника",
    "Для дома",
    "Запчасти",
    "Детские товары",
    "Путешествия",
    "Красота и здоровье"
  ];

  const catSection = document.getElementById("categories");
  categories.forEach(cat => {
    const div = document.createElement("div");
    div.className = "category";
    div.innerHTML = `
      <h3>${cat}</h3>
      <button onclick="window.open('https://t.me/BazarTcmBot', '_blank')">Добавить объявление</button>
    `;
    catSection.appendChild(div);
  });
</script>

</body>
</html>
