<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авто — ₿AZAR TCM</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #fff; color: #222; }
    header { background: #0d47a1; color: #fff; padding: 15px; font-size: 20px; }
    .container { max-width: 1200px; margin: auto; padding: 20px; }
    h2 { margin: 20px 0 10px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fafafa;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.2); }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .card p { padding: 10px; margin: 0; font-weight: bold; }
  </style>
</head>
<body>
  <header>Авто — ₿AZAR TCM</header>
  <div class="container">

    <h2>Подкатегории</h2>
    <div class="grid">
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Легковые"><p>Легковые авто</p></div>
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Новые"><p>Новые авто</p></div>
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Аренда"><p>Аренда авто</p></div>
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Запчасти"><p>Запчасти и аксессуары</p></div>
    </div>

    <h2>Популярные марки</h2>
    <div class="grid">
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Audi"><p>Audi</p></div>
      <div class="card"><img src="https://via.placeholder.com/250x160?text=BMW"><p>BMW</p></div>
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Mercedes"><p>Mercedes-Benz</p></div>
      <div class="card"><img src="https://via.placeholder.com/250x160?text=Toyota"><p>Toyota</p></div>
    </div>

  </div>
</body>
</html>
