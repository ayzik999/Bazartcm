    }

    .btn {

      padding: 10px 18px;
      background: #ffd700;
      color: #0a2f1c;
      text-decoration: none;
      font-weight: 600;
      border-radius: 10px;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }
    .btn:hover {
      background: #e6c200;
    }

    @media(max-width: 600px){

  </style>
