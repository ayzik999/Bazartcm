<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>₿AZAR TCM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(90deg, #0a2f1c, #153f25);
      color: #ffd700;
    }
    header img {
      max-height: 80px;
      display: block;
      margin: 0 auto 15px;
    }
    header h1 { margin: 0; font-size: 28px; font-weight: 700; }
    header p { margin: 5px 0 0; font-size: 16px; color: #f0e68c; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.12); }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card-body { padding: 15px 20px; flex: 1 0 auto; display: flex; flex-direction: column; }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #111; }
    .card-desc { font-size: 14px; color: #555; margin-bottom: 12px; min-height: 40px; }

    .token-row {
      margin-top: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .token-box {
      background: #f3f4f6;
      padding: 8px 10px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      color: #111;
      overflow-wrap: anywhere;
      flex: 1 1 auto;
      min-width: 0;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      background: #ffd700;
      color: #0a2f1c;
      text-decoration: none;
      font-weight: 600;
      border-radius: 10px;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #e6c200; }

    @media(max-width: 600px){
      header h1 { font-size: 24px; }
      header p { font-size: 14px; }
    }
  </style>
</head>

    // Функция копирования в буфер обмена
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          alert("Токен скопирован в буфер обмена");
        }, () => {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        alert("Токен скопирован в буфер обмена");
      } catch (e) {
        alert("Не удалось скопировать токен. Скопируй вручную.");
      }
      document.body.removeChild(ta);
    }
