<html lang="ru">
<head>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #b1e2b1;
      color: #333;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('uzor.jpg');
      background-repeat: repeat;
      background-position: center;
      background-size: 400px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    .site {
      position: relative;
      z-index: 1;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .category {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 8px;
