<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>₿AZAR TCM</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px;
      background: #0a2f1c;
      color: #d4af37;
      font-size: 26px;
      font-weight: bold;
    }
    header img {
      max-height: 100px;
      display: block;
      margin: 0 auto 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .card-body {
      padding: 15px;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #222;
    }
    .card-desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #d4af37;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s;
    }
    .btn:hover {
      background: #b48c2c;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.jpg" alt="₿AZAR TCM">
    ₿AZAR TCM — рынок без границ
  </header>
  <div class="grid" id="products"></div>

  <script>
    async function loadProducts() {
      const res = await fetch("products.json");
      const products = await res.json();
      const container = document.getElementById("products");

      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${p.img}" alt="${p.title}">
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="card-desc">${p.desc}</div>
            <a href="${p.link}" target="_blank" class="btn">Связаться</a>
          </div>
        `;
        container.appendChild(card);
      });
    }
    loadProducts();
  </script>
</body>
</html>
