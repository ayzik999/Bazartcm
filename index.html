<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авто — ₿AZAR TCM</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: #2c3e50; color: #fff; padding: 15px; text-align: center; font-size: 22px; }
    h2 { margin: 20px; color: #333; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .item {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-weight: bold;
      cursor: pointer;
    }
    .item:hover { background: #d7f7d7; }
  </style>
</head>
<body>
  <header>Авто — ₿AZAR TCM</header>

  <h2>Подкатегории</h2>
  <section class="grid">
    <div class="item">Легковые авто</div>
    <div class="item">Новые авто</div>
    <div class="item">Аренда авто</div>
    <div class="item">Запчасти и аксессуары</div>
    <div class="item">Грузовики</div>
    <div class="item">Мотоциклы</div>
    <div class="item">Водный транспорт</div>
  </section>

  <h2>Популярные марки</h2>
  <section class="grid">
    <div class="item">Audi</div>
    <div class="item">BMW</div>
    <div class="item">Hyundai</div>
    <div class="item">Kia</div>
    <div class="item">Mercedes-Benz</div>
    <div class="item">Toyota</div>
    <div class="item">Volkswagen</div>
    <div class="item">LADA (ВАЗ)</div>
  </section>
</body>
</html>
